version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: surface-postgres
    environment:
      POSTGRES_DB: surface
      POSTGRES_USER: surface
      POSTGRES_PASSWORD: surface
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surface -d surface"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
